<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAT Test Flows — PCMS Frontend</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; line-height: 1.6; padding: 20px; }

/* Layout */
.container { max-width: 1200px; margin: 0 auto; }
h1 { font-size: 1.8rem; margin-bottom: .3rem; }
.subtitle { color: #555; margin-bottom: 1.5rem; }
.meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 12px; margin-bottom: 24px; }
.meta-card { background: #fff; border-radius: 10px; padding: 16px; border: 1px solid #e2e8f0; }
.meta-card .label { font-size: .75rem; text-transform: uppercase; color: #718096; letter-spacing: .5px; }
.meta-card .value { font-size: 1.25rem; font-weight: 700; margin-top: 4px; }

/* Progress */
.progress-bar { display: flex; gap: 4px; margin-bottom: 24px; flex-wrap: wrap; }
.prog { flex: 1; min-width: 60px; height: 8px; border-radius: 4px; background: #e2e8f0; position: relative; cursor: pointer; transition: .2s; }
.prog:hover { transform: scaleY(1.4); }
.prog.approved { background: #48bb78; }
.prog.needs-revision { background: #ecc94b; }
.prog.rejected { background: #f56565; }
.prog.open-question { background: #a0aec0; }
.prog-label { font-size: .65rem; color: #718096; text-align: center; margin-top: 2px; }

/* TOC */
.toc { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 24px; }
.toc h2 { font-size: .9rem; text-transform: uppercase; color: #718096; margin-bottom: 8px; letter-spacing: .5px; }
.toc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 6px; }
.toc a { color: #3182ce; text-decoration: none; font-size: .88rem; padding: 4px 8px; border-radius: 4px; transition: .15s; display: block; }
.toc a:hover { background: #ebf4ff; }
.toc .toc-prio { display: inline-block; font-size: .6rem; padding: 1px 6px; border-radius: 3px; margin-left: 4px; font-weight: 600; }
.prio-p0 { background: #fed7d7; color: #c53030; }
.prio-p1 { background: #fefcbf; color: #975a16; }
.prio-p2 { background: #bee3f8; color: #2a4365; }
.prio-p3 { background: #e2e8f0; color: #4a5568; }

/* Section card */
.section { background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 16px; overflow: hidden; }
.section-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; user-select: none; }
.section-header:hover { background: #fafafa; }
.section-header h2 { font-size: 1.1rem; flex: 1; }
.section-header .sec-id { font-size: .7rem; color: #a0aec0; font-family: monospace; }
.section-content { padding: 0 20px 20px; }

/* Status badges */
.status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: .7rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.sb-approved { background: #c6f6d5; color: #22543d; }
.sb-needs-revision { background: #fefcbf; color: #744210; }
.sb-rejected { background: #fed7d7; color: #822727; }
.sb-open-question { background: #e2e8f0; color: #2d3748; }
.sb-none { background: #edf2f7; color: #718096; }

/* Review row */
.review-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 12px 0; padding: 12px; background: #f7fafc; border-radius: 8px; }
.review-row label { font-size: .82rem; font-weight: 600; color: #4a5568; min-width: 60px; }
.review-row select, .review-row input[type="text"] { padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: .82rem; background: #fff; }
.review-row textarea { width: 100%; min-height: 60px; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: .82rem; font-family: inherit; resize: vertical; margin-top: 4px; }

/* Star rating */
.stars { display: inline-flex; gap: 2px; }
.star { cursor: pointer; font-size: 1.4rem; color: #e2e8f0; transition: .1s; }
.star.active { color: #ecc94b; }
.star:hover { transform: scale(1.2); }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 6px; border: none; font-size: .82rem; font-weight: 600; cursor: pointer; transition: .15s; }
.btn-primary { background: #3182ce; color: #fff; }
.btn-primary:hover { background: #2b6cb0; }
.btn-success { background: #48bb78; color: #fff; }
.btn-success:hover { background: #38a169; }
.btn-danger { background: #f56565; color: #fff; }
.btn-danger:hover { background: #e53e3e; }

/* ASCII box */
.ascii-box { background: #1a202c; color: #e2e8f0; padding: 16px; border-radius: 8px; overflow-x: auto; font-family: 'Courier New', Courier, monospace; font-size: .7rem; line-height: 1.3; white-space: pre; margin: 12px 0; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: .88rem; margin: 12px 0; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
th { background: #f7fafc; font-weight: 600; color: #4a5568; font-size: .78rem; text-transform: uppercase; letter-spacing: .3px; }

/* Test case chips */
.tc-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
.tc-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; background: #ebf4ff; color: #2b6cb0; border-radius: 12px; font-size: .75rem; font-weight: 500; }

/* Priority chips */
.prio-chips { display: flex; gap: 8px; margin: 8px 0; }
.prio-chips button { padding: 4px 14px; border-radius: 20px; border: 2px solid #e2e8f0; font-size: .78rem; font-weight: 600; cursor: pointer; transition: .15s; background: #fff; }
.prio-chips button:hover { border-color: #a0aec0; }
.prio-chips button.active-p0 { border-color: #f56565; background: #fed7d7; color: #c53030; }
.prio-chips button.active-p1 { border-color: #ecc94b; background: #fefcbf; color: #975a16; }
.prio-chips button.active-p2 { border-color: #63b3ed; background: #bee3f8; color: #2a4365; }
.prio-chips button.active-p3 { border-color: #a0aec0; background: #edf2f7; color: #4a5568; }

/* XML preview */
#xmlPreview { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
#xmlPreview.show { display: flex; }
.xml-box { background: #fff; border-radius: 12px; max-width: 800px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; }
.xml-box-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #e2e8f0; }
.xml-box-body { overflow: auto; padding: 20px; }
.xml-box-body pre { background: #1a202c; color: #e2e8f0; padding: 16px; border-radius: 8px; font-size: .72rem; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }

/* Accordion */
.section-content { display: none; }
.section.open .section-content { display: block; }
.section-header .arrow { transition: transform .2s; font-size: .8rem; color: #a0aec0; }
.section.open .arrow { transform: rotate(90deg); }

/* Choice / decision */
.choice-group { margin: 8px 0; }
.choice-group label { display: inline-flex; align-items: center; gap: 4px; margin-right: 16px; font-size: .82rem; font-weight: 400; cursor: pointer; }
.choice-group input { margin: 0; }

/* Comment list */
.comment-list { margin-top: 8px; }
.comment-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 12px; margin-bottom: 4px; font-size: .8rem; }
.comment-item .time { font-size: .65rem; color: #a0aec0; }

/* Reset button */
.reset-btn { float: right; font-size: .7rem; color: #a0aec0; background: none; border: none; cursor: pointer; text-decoration: underline; }
.reset-btn:hover { color: #f56565; }

@media(max-width:640px) {
  body { padding: 12px; }
  .meta-grid { grid-template-columns: 1fr 1fr; }
  .toc-grid { grid-template-columns: 1fr; }
  .review-row { flex-direction: column; align-items: stretch; }
  .ascii-box { font-size: .55rem; }
}
</style>
</head>

// ===== STATE =====
const STORAGE_KEY = 'uat-review-pcms';
let state = loadState();

function defaultState() {
  return {
    sections: Object.fromEntries(SECTIONS.map(s => [s.id, {
      status: 'none',
      priority: s.priority,
      ratings: { clarity: 0, completeness: 0, feasibility: 0 },
      comments: [],
      choices: {}
    }]))
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Merge with defaults for new sections
      const def = defaultState();
      for (const sid of Object.keys(def.sections)) {
        if (!parsed.sections[sid]) parsed.sections[sid] = def.sections[sid];
        else { Object.keys(def.sections[sid].ratings).forEach(k => { if (!parsed.sections[sid].ratings[k]) parsed.sections[sid].ratings[k] = 0; }); }
      }
      return parsed;
    }
  } catch {}
  return defaultState();
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ===== RENDER =====
function render() {
  const container = document.getElementById('sections');
  const toc = document.getElementById('toc');
  container.innerHTML = '';
  toc.innerHTML = '';

  const prioLabels = { p0: 'P0', p1: 'P1', p2: 'P2', p3: 'P3' };

  SECTIONS.forEach((sec, idx) => {
    const secState = state.sections[sec.id];

    // TOC
    const tocItem = document.createElement('a');
    tocItem.href = `#${sec.id}`;
    tocItem.textContent = `${sec.title}`;
    const prioBadge = document.createElement('span');
    prioBadge.className = `toc-prio prio-${sec.priority}`;
    prioBadge.textContent = prioLabels[sec.priority] || '';
    tocItem.appendChild(prioBadge);
    toc.appendChild(tocItem);

    // Section card
    const card = document.createElement('div');
    card.className = 'section';
    card.id = sec.id;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.onclick = () => { card.classList.toggle('open'); saveState(); };

    const arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.textContent = '▶';
    header.appendChild(arrow);

    const h2 = document.createElement('h2');
    h2.textContent = sec.title;
    header.appendChild(h2);

    const idSpan = document.createElement('span');
    idSpan.className = 'sec-id';
    idSpan.textContent = sec.id;
    header.appendChild(idSpan);

    const badge = document.createElement('span');
    badge.className = `status-badge sb-${secState.status}`;
    badge.textContent = statusLabel(secState.status);
    header.appendChild(badge);

    card.appendChild(header);

    // Content
    const content = document.createElement('div');
    content.className = 'section-content';

    const desc = document.createElement('p');
    desc.style.cssText = 'color:#718096;font-size:.85rem;margin-bottom:8px;';
    desc.textContent = sec.desc;
    content.appendChild(desc);

    // Spec content
    const specDiv = document.createElement('div');
    specDiv.innerHTML = sec.content;
    content.appendChild(specDiv);

    // Review controls
    const review = document.createElement('div');
    review.className = 'review-row';

    // Status
    const sl = document.createElement('label');
    sl.textContent = 'Status:';
    review.appendChild(sl);
    const sel = document.createElement('select');
    ['none','approved','needs-revision','rejected','open-question'].forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = statusLabel(s);
      if (s === secState.status) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = () => {
      secState.status = sel.value;
      badge.className = `status-badge sb-${secState.status}`;
      badge.textContent = statusLabel(secState.status);
      saveState(); updateProgress();
    };
    review.appendChild(sel);

    // Priority
    const pl = document.createElement('label');
    pl.textContent = 'Priority:';
    review.appendChild(pl);
    const prioDiv = document.createElement('div');
    prioDiv.className = 'prio-chips';
    ['p0','p1','p2','p3'].forEach(p => {
      const btn = document.createElement('button');
      btn.textContent = p.toUpperCase();
      if (p === secState.priority) btn.className = `active-${p}`;
      btn.onclick = () => {
        secState.priority = p;
        prioDiv.querySelectorAll('button').forEach(b => b.className = '');
        btn.className = `active-${p}`;
        saveState();
      };
      prioDiv.appendChild(btn);
    });
    review.appendChild(prioDiv);

    // Ratings
    const rl = document.createElement('label');
    rl.textContent = 'Rating:';
    review.appendChild(rl);
    ['clarity','completeness','feasibility'].forEach(r => {
      const span = document.createElement('span');
      span.style.cssText = 'display:inline-flex;align-items:center;gap:2px;margin-right:8px;font-size:.75rem;';
      span.textContent = r.charAt(0).toUpperCase()+r.slice(1)+':';
      const stars = document.createElement('span');
      stars.className = 'stars';
      for (let i=1;i<=5;i++) {
        const s = document.createElement('span');
        s.className = 'star' + (i <= secState.ratings[r] ? ' active' : '');
        s.textContent = '★';
        s.onclick = () => {
          secState.ratings[r] = i;
          stars.querySelectorAll('.star').forEach((st,j) => st.classList.toggle('active', j < i));
          saveState();
        };
        stars.appendChild(s);
      }
      span.appendChild(stars);
      review.appendChild(span);
    });

    content.appendChild(review);

    // Comments
    const commDiv = document.createElement('div');
    commDiv.style.marginTop = '8px';
    const commLabel = document.createElement('label');
    commLabel.textContent = '✏️ Comment:';
    commLabel.style.cssText = 'font-size:.82rem;font-weight:600;color:#4a5568;display:block;margin-bottom:4px;';
    commDiv.appendChild(commLabel);
    const commInput = document.createElement('textarea');
    commInput.placeholder = 'Nhập nhận xét... (Enter để thêm)';
    commInput.style.cssText = 'width:100%;min-height:40px;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:.82rem;font-family:inherit;resize:vertical;';
    commInput.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const val = commInput.value.trim();
        if (val) {
          secState.comments.push({ text: val, time: new Date().toISOString() });
          commInput.value = '';
          renderComments(commList, secState.comments);
          saveState();
        }
      }
    };
    commDiv.appendChild(commInput);
    const commList = document.createElement('div');
    commList.className = 'comment-list';
    renderComments(commList, secState.comments);
    commDiv.appendChild(commList);
    content.appendChild(commDiv);

    // Reset section
    const resetBtn = document.createElement('button');
    resetBtn.className = 'reset-btn';
    resetBtn.textContent = '↺ Reset section';
    resetBtn.onclick = () => {
      secState.status = 'none';
      secState.ratings = { clarity: 0, completeness: 0, feasibility: 0 };
      secState.comments = [];
      secState.choices = {};
      sel.value = 'none';
      badge.className = `status-badge sb-${secState.status}`;
      badge.textContent = statusLabel(secState.status);
      renderComments(commList, []);
      // Reset star displays
      content.querySelectorAll('.stars').forEach((starsEl, si) => {
        starsEl.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
      });
      saveState(); updateProgress();
    };
    content.appendChild(resetBtn);

    // Open by default if not reviewed
    if (secState.status === 'none') card.classList.add('open');

    card.appendChild(content);
    container.appendChild(card);
  });

  updateProgress();
}

function renderComments(el, comments) {
  el.innerHTML = comments.map(c =>
    `<div class="comment-item">
      <div>${escapeXml(c.text)}</div>
      <div class="time">${new Date(c.time).toLocaleString('vi-VN')}</div>
    </div>`
  ).join('');
}

function statusLabel(s) {
  return { 'none':'Chưa ĐG', 'approved':'✅ Đạt', 'needs-revision':'⚠️ Cần sửa', 'rejected':'❌ Từ chối', 'open-question':'❓ Hỏi' }[s] || s;
}

function updateProgress() {
  const container = document.getElementById('progressContainer');
  const label = document.getElementById('progLabel');
  container.innerHTML = '';
  const counts = { approved: 0, 'needs-revision': 0, rejected: 0, 'open-question': 0, none: 0 };
  SECTIONS.forEach(s => {
    const st = state.sections[s.id].status;
    counts[st] = (counts[st] || 0) + 1;
    const bar = document.createElement('div');
    bar.className = 'prog';
    if (st !== 'none') bar.classList.add(st);
    bar.title = `${s.title}: ${statusLabel(st)}`;
    bar.onclick = () => {
      document.getElementById(s.id)?.scrollIntoView({ behavior: 'smooth' });
    };
    container.appendChild(bar);
  });
  const total = SECTIONS.length;
  const done = total - counts.none;
  label.textContent = `Đã đánh giá: ${done}/${total} section (${Math.round(done/total*100)}%) · ✅ ${counts.approved} · ⚠️ ${counts['needs-revision']} · ❌ ${counts.rejected} · ❓ ${counts['open-question']}`;
}

// ===== XML =====
function generateXML() {
  const now = new Date().toISOString();
  let xml = `<spec_review_prompt version="1.0">\n`;
  xml += `  <metadata>\n    <title>UAT Test Flows — PCMS Frontend</title>\n`;
  xml += `    <source>provided_spec</source>\n    <created_at>${now}</created_at>\n`;
  xml += `    <review_goal>UAT sign-off cho PCMS frontend — 10 flows, 80 màn hình</review_goal>\n  </metadata>\n`;

  xml += `  <spec>\n`;
  SECTIONS.forEach(sec => {
    const st = state.sections[sec.id];
    xml += `    <section id="${sec.id}">\n`;
    xml += `      <title>${escapeXml(sec.title)}</title>\n`;
    // content stripped — just reference
    xml += `      <review>\n`;
    xml += `        <status>${st.status}</status>\n`;
    xml += `        <priority>${st.priority}</priority>\n`;
    xml += `        <ratings>\n`;
    xml += `          <rating name="clarity">${st.ratings.clarity}</rating>\n`;
    xml += `          <rating name="completeness">${st.ratings.completeness}</rating>\n`;
    xml += `          <rating name="feasibility">${st.ratings.feasibility}</rating>\n`;
    xml += `        </ratings>\n`;
    if (st.comments.length) {
      xml += `        <comments>\n`;
      st.comments.forEach(c => xml += `          <comment>${escapeXml(c.text)}</comment>\n`);
      xml += `        </comments>\n`;
    }
    xml += `      </review>\n    </section>\n`;
  });
  xml += `  </spec>\n`;

  const counts = { approved: 0, 'needs-revision': 0, rejected: 0, 'open-question': 0 };
  SECTIONS.forEach(s => { const st = state.sections[s.id]; if (counts[st.status] !== undefined) counts[st.status]++; });
  xml += `  <summary>\n`;
  xml += `    <approved_sections>${counts.approved}</approved_sections>\n`;
  xml += `    <needs_revision_sections>${counts['needs-revision']}</needs_revision_sections>\n`;
  xml += `    <rejected_sections>${counts.rejected}</rejected_sections>\n`;
  xml += `    <open_questions>${counts['open-question']}</open_questions>\n`;
  xml += `  </summary>\n`;
  xml += `  <instruction>Use the reviewed spec, comments, and status above as the source of truth for the next implementation or planning step.</instruction>\n`;
  xml += `</spec_review_prompt>`;
  return xml;
}

function showXML() {
  document.getElementById('xmlContent').textContent = generateXML();
  document.getElementById('xmlPreview').classList.add('show');
}

function hideXML() {
  document.getElementById('xmlPreview').classList.remove('show');
}

function copyXML() {
  const text = document.getElementById('xmlContent').textContent;
  navigator.clipboard.writeText(text).then(() => {
    alert('✅ Copied XML to clipboard!');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✅ Copied (fallback)');
  });
}

function resetAll() {
  if (!confirm('Xoá tất cả đánh giá?')) return;
  state = defaultState();
  saveState();
  render();
}

function escapeXml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

// ===== BOOT =====
render();
</script>
</body>
</html>
